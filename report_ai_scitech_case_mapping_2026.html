<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 활용 기술 혁신 사례 보고서</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f7fb;
      --paper: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --head: #0f172a;
      --brand: #0f766e;
      --brand-soft: #e6fffb;
      --code-bg: #f8fafc;
      --table-head: #eff6ff;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.07);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "IBM Plex Sans KR", system-ui, -apple-system, Segoe UI, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 520px at 100% -10%, #dbeafe 0%, transparent 65%),
        radial-gradient(1100px 460px at -10% -10%, #ccfbf1 0%, transparent 60%),
        var(--bg);
      line-height: 1.75;
      letter-spacing: -0.01em;
    }

    .wrap {
      max-width: 1120px;
      margin: 24px auto 40px;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 18px;
    }

    .toc {
      position: sticky;
      top: 14px;
      align-self: start;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 14px;
      max-height: calc(100vh - 28px);
      overflow: auto;
    }

    .toc h2 {
      margin: 0 0 10px;
      font-size: 0.96rem;
      color: var(--head);
      letter-spacing: -0.01em;
    }

    .toc ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 5px;
    }

    .toc a {
      color: #334155;
      text-decoration: none;
      font-size: 0.83rem;
      display: block;
      padding: 4px 8px;
      border-radius: 8px;
    }

    .toc a:hover {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .paper {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, #ecfeff, #eff6ff);
    }

    .hero h1 {
      margin: 0;
      font-size: 1.28rem;
      color: #0f172a;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin: 6px 0 0;
      color: #475569;
      font-size: 0.88rem;
    }

    .content {
      padding: 22px;
      overflow-wrap: anywhere;
    }

    .content h1, .content h2, .content h3, .content h4 {
      color: var(--head);
      letter-spacing: -0.015em;
      scroll-margin-top: 16px;
    }

    .content h1 {
      font-size: 1.7rem;
      margin: 4px 0 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid #dbeafe;
    }

    .content h2 {
      font-size: 1.26rem;
      margin: 28px 0 10px;
      border-left: 4px solid var(--brand);
      padding-left: 10px;
    }

    .content h3 {
      font-size: 1.06rem;
      margin: 22px 0 8px;
    }

    .content h4 {
      font-size: 0.97rem;
      margin: 16px 0 6px;
    }

    .content p { margin: 10px 0; }

    .content a {
      color: #1d4ed8;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
    }

    .content blockquote {
      margin: 12px 0;
      padding: 10px 14px;
      background: var(--brand-soft);
      border-left: 4px solid var(--brand);
      border-radius: 0 10px 10px 0;
      color: #134e4a;
    }

    .content ul, .content ol { padding-left: 22px; }

    .content hr {
      border: none;
      border-top: 1px dashed #cbd5e1;
      margin: 20px 0;
    }

    .content table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin: 12px 0 18px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      overflow: hidden;
      font-size: 0.91rem;
    }

    .content th,
    .content td {
      border-right: 1px solid #e5e7eb;
      border-bottom: 1px solid #e5e7eb;
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }

    .content th:last-child,
    .content td:last-child { border-right: 0; }

    .content tr:last-child td { border-bottom: 0; }

    .content thead th {
      background: var(--table-head);
      color: #1e3a8a;
      font-weight: 700;
    }

    .content tbody tr:nth-child(even) td {
      background: #fcfdff;
    }

    .content code {
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: var(--code-bg);
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 0.1em 0.35em;
      font-size: 0.88em;
    }

    .content pre {
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 10px;
      padding: 12px;
      overflow: auto;
      font-size: 0.86rem;
    }

    .content pre code {
      background: transparent;
      border: 0;
      padding: 0;
      color: inherit;
    }

    .note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.82rem;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    .loading,
    .error {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: #334155;
    }

    @media (max-width: 980px) {
      .wrap {
        grid-template-columns: 1fr;
      }
      .toc {
        position: static;
        max-height: none;
      }
    }

    @media print {
      body { background: #fff; }
      .wrap { display: block; margin: 0; padding: 0; max-width: none; }
      .toc { display: none; }
      .paper { border: 0; box-shadow: none; }
      .content { padding: 0; }
      a { color: #111827; text-decoration: none; }
    }
  </style>
</head>

  </main>

    function decodeBase64Utf8(input) {
      try {
        const bytes = Uint8Array.from(atob(input), (c) => c.charCodeAt(0));
        return new TextDecoder('utf-8').decode(bytes);
      } catch (_) {
        return '';
      }
    }

    function slugify(text) {
      return (text || '')
        .toLowerCase()
        .trim()
        .replace(/[\s]+/g, '-')
        .replace(/[^\w\-가-힣]/g, '');
    }

    function buildToc(container) {
      const headings = [...container.querySelectorAll('h1, h2, h3')];
      const toc = document.getElementById('toc-list');
      toc.innerHTML = '';

      headings.forEach((h, idx) => {
        const id = `${slugify(h.textContent)}-${idx}`;
        h.id = id;
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = `#${id}`;
        a.textContent = h.textContent;
        if (h.tagName === 'H3') a.style.paddingLeft = '16px';
        if (h.tagName === 'H1') a.style.fontWeight = '700';
        li.appendChild(a);
        toc.appendChild(li);
      });
    }

    async function renderReport() {
      const content = document.getElementById('content');
      try {
        const res = await fetch(mdPath);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const md = await res.text();
        content.innerHTML = marked.parse(md, { breaks: true, gfm: true });
        buildToc(content);

        const footer = document.createElement('p');
        footer.className = 'note';
        footer.textContent = '원본: report_ai_scitech_case_mapping_2026.md';
        content.appendChild(footer);
      } catch (err) {
        const embeddedMd = decodeBase64Utf8(embeddedMdBase64);
        if (embeddedMd) {
          content.innerHTML = marked.parse(embeddedMd, { breaks: true, gfm: true });
          buildToc(content);

          const footer = document.createElement('p');
          footer.className = 'note';
          footer.textContent = '원본(내장본): report_ai_scitech_case_mapping_2026.md';
          content.appendChild(footer);
          return;
        }

        content.innerHTML = `<div class="error">보고서를 불러오지 못했습니다: ${String(err.message || err)}</div>`;
      }
    }

    renderReport();
  </script>
